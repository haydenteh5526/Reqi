<!-- Option C: Eval bar + piece (review tool concept) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1816"/>
  <!-- Eval bar on left -->
  <rect x="80" y="100" width="40" height="312" rx="20" fill="#403d39"/>
  <rect x="80" y="250" width="40" height="162" rx="20" fill="#f0eeec"/>
  <!-- Piece (cannon) -->
  <circle cx="300" cy="256" r="120" fill="#c4473b" stroke="#9e3830" stroke-width="8"/>
  <circle cx="300" cy="256" r="98" fill="none" stroke="#f5e8e0" stroke-width="3" opacity="0.5"/>
  <text x="300" y="292" text-anchor="middle" font-size="120" font-family="serif" font-weight="bold" fill="#f5e8e0">炮</text>
  <!-- Green best-move checkmark -->
  <circle cx="400" cy="160" r="35" fill="#81b64c"/>
  <text x="400" y="175" text-anchor="middle" font-size="40" font-weight="bold" fill="white">★</text>
</svg>
