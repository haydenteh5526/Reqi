<!-- Option B: Magnifying glass + board grid (analysis/review concept) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1816"/>
  <!-- Board grid lines -->
  <g stroke="#81b64c" stroke-width="2" opacity="0.3">
    <line x1="140" y1="160" x2="140" y2="380"/>
    <line x1="210" y1="160" x2="210" y2="380"/>
    <line x1="280" y1="160" x2="280" y2="380"/>
    <line x1="350" y1="160" x2="350" y2="380"/>
    <line x1="100" y1="200" x2="390" y2="200"/>
    <line x1="100" y1="270" x2="390" y2="270"/>
    <line x1="100" y1="340" x2="390" y2="340"/>
  </g>
  <!-- Piece -->
  <circle cx="210" cy="270" r="50" fill="#c4473b" stroke="#9e3830" stroke-width="5"/>
  <text x="210" y="290" text-anchor="middle" font-size="50" font-family="serif" font-weight="bold" fill="#f5e8e0">車</text>
  <!-- Magnifying glass -->
  <circle cx="320" cy="320" r="70" fill="none" stroke="#81b64c" stroke-width="10"/>
  <line x1="370" y1="370" x2="420" y2="420" stroke="#81b64c" stroke-width="12" stroke-linecap="round"/>
</svg>
